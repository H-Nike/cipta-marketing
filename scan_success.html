<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Cipta — Receipt verified</title>
<link rel="stylesheet" href="../cipta_design/tokens.css" />
<link rel="stylesheet" href="cipta.css" />
<style>
  body { padding-bottom: 0; align-items: center; justify-content: center; }
  main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 24px;
    width: 100%;
  }

  .stage {
    width: 100%;
    max-width: 380px;
    text-align: center;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 44px 28px 32px;
    position: relative;
    box-shadow: var(--shadow-paper);
  }
  .stage::before, .stage::after {
    content: ""; position: absolute; left: 0; right: 0; height: 12px;
    background: radial-gradient(circle at 7px 12px, transparent 7px, var(--paper) 7.5px) 0 0 / 14px 12px repeat-x;
  }
  .stage::before { top: -10px; }
  .stage::after { bottom: -10px; transform: scaleY(-1); }

  .stage__stamp {
    width: 72px; height: 72px;
    margin: 0 auto 22px;
    border: 3px solid var(--stamp);
    color: var(--stamp);
    background: var(--stamp-bleed);
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 900;
    font-size: 32px;
    transform: rotate(-7deg);
    box-shadow: inset 0 0 22px rgba(200,53,28,0.12);
    animation: pop 480ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes pop {
    0% { transform: rotate(-7deg) scale(0); opacity: 0; }
    60% { transform: rotate(-7deg) scale(1.12); }
    100% { transform: rotate(-7deg) scale(1); opacity: 1; }
  }

  .stage__title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--t-lg);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 10px;
  }
  .stage__sub {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin: 0 0 24px;
  }

  .stage__pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border: 1.5px solid var(--stamp);
    background: var(--stamp-bleed);
    color: var(--stamp);
    border-radius: var(--r-sm);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 26px;
  }
  .stage__pill::before { content: "✓"; }

  .stage__hint {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
    margin: 0;
  }
</style>
</head>
<body class="cipta-shell">

<header class="cipta-topbar">
  <a class="cipta-topbar__brand" href="dashboard.html">Cipta</a>
  <div class="cipta-topbar__title">Verified</div>
  <div></div>
</header>

<main>
  <div class="stage" role="status" aria-live="polite">
    <div class="stage__stamp" aria-hidden="true">✓</div>
    <h1 class="stage__title">Receipt verified</h1>
    <p class="stage__sub">Items extracted · checks passed</p>

    <div class="stage__pill">Verified plate</div>

    <p class="stage__hint">Loading your items…</p>
  </div>
</main>

<script src="cipta.js" defer></script>
</body>
</html>
