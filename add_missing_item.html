<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Cipta — Add missing item</title>
<link rel="stylesheet" href="../cipta_design/tokens.css" />
<link rel="stylesheet" href="cipta.css" />
<style>
  body { padding-bottom: 80px; }

  main {
    max-width: 540px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .heading { margin-bottom: 24px; }
  .heading__eyebrow {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .heading__title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--t-xl);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 12px;
  }
  .heading__title em { font-style: italic; color: var(--stamp); font-weight: 400; }
  .heading__sub {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
    margin: 0;
  }

  .search-card {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 22px 20px;
    margin-bottom: 28px;
    position: relative;
  }
  .search-card::before {
    content: "+ ADD ONE LINE";
    position: absolute;
    top: -10px; left: 16px;
    background: var(--paper);
    padding: 0 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-faded);
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field__label {
    display: block;
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .field__input {
    width: 100%;
    background: var(--paper-warm);
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: var(--t-base);
    color: var(--ink);
    transition: background 160ms, box-shadow 160ms;
  }
  .field__input:focus {
    outline: 0;
    background: var(--paper);
    box-shadow: 0 0 0 2px var(--stamp);
    border-color: var(--stamp);
  }
  .field__input::placeholder { color: var(--ink-faded); }
  .field__row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .submit {
    display: block;
    width: 100%;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 14px 20px;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 18px;
    text-align: center;
    text-decoration: none;
  }
  .submit:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 0 var(--stamp);
  }

  .section-title {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin: 8px 0 14px;
    padding-bottom: 8px;
    border-bottom: 1.5px dashed var(--ink-faded);
  }

  .suggestions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .suggestion {
    display: block;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 14px 14px 12px;
    text-align: left;
    cursor: pointer;
    transition: transform 160ms, box-shadow 160ms;
  }
  .suggestion:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 0 var(--ink);
  }
  .suggestion__name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: var(--t-base);
    letter-spacing: -0.005em;
    margin: 0 0 4px;
  }
  .suggestion__store {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faded);
  }
  .suggestion__add {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--stamp);
  }
</style>
</head>
<body class="cipta-shell">

<header class="cipta-topbar">
  <a class="cipta-topbar__brand" href="dashboard.html">Cipta</a>
  <div class="cipta-topbar__title">Add item</div>
  <a class="cipta-topbar__action" href="scanned_items.html">Done</a>
</header>

<main>
  <div class="heading feed-in feed-in-1">
    <p class="heading__eyebrow">Off the receipt</p>
    <h1 class="heading__title">Add a dish<br /><em>by hand.</em></h1>
    <p class="heading__sub">Goes on the same plate · counts toward verification</p>
  </div>

  <form class="search-card feed-in feed-in-2"
        onsubmit="event.preventDefault(); window.location.href='scanned_items.html';">
    <div class="field">
      <label class="field__label" for="dish">Dish name</label>
      <input class="field__input" id="dish" type="text" placeholder="e.g. Carbonara" required />
    </div>
    <div class="field">
      <div class="field__row">
        <div>
          <label class="field__label" for="price">Price <span style="text-transform:none;letter-spacing:0;">(optional)</span></label>
          <input class="field__input" id="price" type="text" placeholder="$ 0.00" />
        </div>
        <div>
          <label class="field__label" for="qty">How many</label>
          <input class="field__input" id="qty" type="number" min="1" value="1" />
        </div>
      </div>
    </div>
    <button type="submit" class="submit">Add to plate</button>
  </form>

  <h2 class="section-title">Common at this restaurant</h2>
  <div class="suggestions">
    <button type="button" class="suggestion"
            onclick="window.location.href='scanned_items.html';">
      <div class="suggestion__name">[ dish ]</div>
      <div class="suggestion__store">[ category ]</div>
      <div class="suggestion__add">+ Add</div>
    </button>
    <button type="button" class="suggestion"
            onclick="window.location.href='scanned_items.html';">
      <div class="suggestion__name">[ dish ]</div>
      <div class="suggestion__store">[ category ]</div>
      <div class="suggestion__add">+ Add</div>
    </button>
    <button type="button" class="suggestion"
            onclick="window.location.href='scanned_items.html';">
      <div class="suggestion__name">[ dish ]</div>
      <div class="suggestion__store">[ category ]</div>
      <div class="suggestion__add">+ Add</div>
    </button>
    <button type="button" class="suggestion"
            onclick="window.location.href='scanned_items.html';">
      <div class="suggestion__name">[ dish ]</div>
      <div class="suggestion__store">[ category ]</div>
      <div class="suggestion__add">+ Add</div>
    </button>
  </div>
</main>

<nav class="cipta-tabbar fixed bottom-0" aria-label="primary">
  <a href="dashboard.html" data-icon="home"><span class="tab__glyph">▥</span><span>Home</span></a>
  <a href="plate_history.html" data-icon="history"><span class="tab__glyph">≡</span><span>History</span></a>
  <a href="taste_favorites.html" data-icon="restaurant_menu" class="is-active"><span class="tab__glyph">★</span><span>Taste</span></a>
  <a href="profile.html" data-icon="person"><span class="tab__glyph">○</span><span>Profile</span></a>
</nav>

<script src="cipta.js" defer></script>
</body>
</html>
