<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Cipta — Rate every dish</title>
<link rel="stylesheet" href="../cipta_design/tokens.css" />
<link rel="stylesheet" href="cipta.css" />
<style>
  body { padding-bottom: 110px; }

  main {
    max-width: 540px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .heading { margin-bottom: 24px; }
  .heading__eyebrow {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    margin-bottom: 12px;
    padding: 4px 10px;
    border: 1.5px solid var(--ink-soft);
    border-radius: var(--r-sm);
    display: inline-block;
  }
  .heading__title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--t-xl);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 12px;
  }
  .heading__title em { font-style: italic; color: var(--stamp); font-weight: 400; }
  .heading__sub {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
    margin: 0;
  }

  .receipt {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 26px 22px 22px;
    position: relative;
    box-shadow: var(--shadow-paper);
    margin-bottom: 18px;
  }
  .receipt::before, .receipt::after {
    content: ""; position: absolute; left: 0; right: 0; height: 12px;
    background: radial-gradient(circle at 7px 12px, transparent 7px, var(--paper) 7.5px) 0 0 / 14px 12px repeat-x;
  }
  .receipt::before { top: -10px; }
  .receipt::after { bottom: -10px; transform: scaleY(-1); }

  .receipt__head {
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1.5px dashed var(--ink-faded);
  }
  .receipt__store {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--t-md);
    letter-spacing: -0.01em;
  }
  .receipt__meta {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faded);
    margin-top: 4px;
  }

  .row {
    padding: 18px 4px;
    border-bottom: 1px dotted var(--ink-faded);
  }
  .row:last-of-type { border-bottom: 0; }
  .row__head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
    gap: 12px;
  }
  .row__name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: var(--t-base);
    letter-spacing: -0.005em;
    line-height: 1.2;
    flex: 1;
  }
  .row__score {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: var(--t-sm);
    color: var(--stamp);
    letter-spacing: 0.18em;
  }

  /* tap-to-rate stars */
  .stars {
    display: inline-flex;
    gap: 6px;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .stars__btn {
    background: transparent;
    border: 0;
    font-family: var(--font-mono);
    font-size: 28px;
    line-height: 1;
    color: var(--paper-deep);
    cursor: pointer;
    transition: color 120ms;
    padding: 0;
  }
  .stars[data-value="1"] .stars__btn:nth-child(-n+1),
  .stars[data-value="2"] .stars__btn:nth-child(-n+2),
  .stars[data-value="3"] .stars__btn:nth-child(-n+3),
  .stars[data-value="4"] .stars__btn:nth-child(-n+4),
  .stars[data-value="5"] .stars__btn:nth-child(-n+5) {
    color: var(--stamp);
  }
  .stars__btn:hover { color: var(--stamp); }

  .row__note {
    width: 100%;
    background: var(--paper-warm);
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    font-family: var(--font-body);
    font-size: var(--t-sm);
    color: var(--ink);
    resize: vertical;
    min-height: 56px;
    margin-top: 6px;
  }
  .row__note:focus {
    outline: 0;
    background: var(--paper);
    box-shadow: 0 0 0 2px var(--stamp);
    border-color: var(--stamp);
  }
  .row__note::placeholder { color: var(--ink-faded); }
  .row__note-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faded);
    margin-top: 4px;
  }

  /* sticky CTA above tab bar */
  .stick {
    position: fixed;
    left: 12px; right: 12px;
    bottom: calc(70px + env(safe-area-inset-bottom));
    z-index: 55;
  }
  .stick a {
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 14px 22px;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    box-shadow: 4px 4px 0 0 var(--stamp);
  }
</style>
</head>
<body class="cipta-shell">

<header class="cipta-topbar">
  <a class="cipta-topbar__brand" href="dashboard.html">Cipta</a>
  <div class="cipta-topbar__title">Rate</div>
  <a class="cipta-topbar__action" href="mood_selection.html">Back</a>
</header>

<main>
  <div class="heading feed-in feed-in-1">
    <span class="heading__eyebrow">Step 3 of 3</span>
    <h1 class="heading__title">Rate every<br /><em>dish.</em></h1>
    <p class="heading__sub">Each item gets its own score · take ~10 sec each</p>
  </div>

  <article class="receipt feed-in feed-in-2">
    <header class="receipt__head">
      <div class="receipt__store">[ RESTAURANT ]</div>
      <div class="receipt__meta">[ DATE · TABLE ]</div>
    </header>

    <div class="row">
      <div class="row__head">
        <div class="row__name">[ item 1 ]</div>
        <div class="row__score">★★★★★</div>
      </div>
      <div class="stars" data-value="5" role="radiogroup" aria-label="rate item 1">
        <button class="stars__btn" data-rate="1">★</button>
        <button class="stars__btn" data-rate="2">★</button>
        <button class="stars__btn" data-rate="3">★</button>
        <button class="stars__btn" data-rate="4">★</button>
        <button class="stars__btn" data-rate="5">★</button>
      </div>
      <textarea class="row__note" placeholder="One line — what made it (optional)"></textarea>
    </div>

    <div class="row">
      <div class="row__head">
        <div class="row__name">[ item 2 ]</div>
        <div class="row__score">★★★★☆</div>
      </div>
      <div class="stars" data-value="4">
        <button class="stars__btn" data-rate="1">★</button>
        <button class="stars__btn" data-rate="2">★</button>
        <button class="stars__btn" data-rate="3">★</button>
        <button class="stars__btn" data-rate="4">★</button>
        <button class="stars__btn" data-rate="5">★</button>
      </div>
      <textarea class="row__note" placeholder="One line — what made it (optional)"></textarea>
    </div>

    <div class="row">
      <div class="row__head">
        <div class="row__name">[ item 3 ]</div>
        <div class="row__score">★★★★★</div>
      </div>
      <div class="stars" data-value="5">
        <button class="stars__btn" data-rate="1">★</button>
        <button class="stars__btn" data-rate="2">★</button>
        <button class="stars__btn" data-rate="3">★</button>
        <button class="stars__btn" data-rate="4">★</button>
        <button class="stars__btn" data-rate="5">★</button>
      </div>
      <textarea class="row__note" placeholder="One line — what made it (optional)"></textarea>
    </div>

    <div class="row">
      <div class="row__head">
        <div class="row__name">[ item 4 ]</div>
        <div class="row__score">★★★☆☆</div>
      </div>
      <div class="stars" data-value="3">
        <button class="stars__btn" data-rate="1">★</button>
        <button class="stars__btn" data-rate="2">★</button>
        <button class="stars__btn" data-rate="3">★</button>
        <button class="stars__btn" data-rate="4">★</button>
        <button class="stars__btn" data-rate="5">★</button>
      </div>
      <textarea class="row__note" placeholder="One line — what made it (optional)"></textarea>
    </div>
  </article>
</main>

<div class="stick">
  <a href="summary_screen.html">See your verified plate →</a>
</div>

<nav class="cipta-tabbar fixed bottom-0" aria-label="primary">
  <a href="dashboard.html" data-icon="home"><span class="tab__glyph">▥</span><span>Home</span></a>
  <a href="plate_history.html" data-icon="history"><span class="tab__glyph">≡</span><span>History</span></a>
  <a href="taste_favorites.html" data-icon="restaurant_menu" class="is-active"><span class="tab__glyph">★</span><span>Taste</span></a>
  <a href="profile.html" data-icon="person"><span class="tab__glyph">○</span><span>Profile</span></a>
</nav>

<script>
  document.querySelectorAll('.stars').forEach((group) => {
    group.querySelectorAll('.stars__btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const v = parseInt(btn.dataset.rate, 10);
        group.dataset.value = String(v);
        const scoreEl = group.closest('.row').querySelector('.row__score');
        if (scoreEl) scoreEl.textContent = '★'.repeat(v) + '☆'.repeat(5 - v);
      });
    });
  });
</script>
<script src="cipta.js" defer></script>
</body>
</html>
