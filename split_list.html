<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Cipta — Split list</title>
<link rel="stylesheet" href="../cipta_design/tokens.css" />
<link rel="stylesheet" href="cipta.css" />
<style>
  body { padding-bottom: 120px; }

  main {
    max-width: 540px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .heading { margin-bottom: 24px; }
  .heading__eyebrow {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .heading__title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--t-xl);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 12px;
  }
  .heading__title em { font-style: italic; color: var(--stamp); font-weight: 400; }
  .heading__sub {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
    margin: 0;
  }

  .section-title {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin: 28px 0 14px;
    padding-bottom: 8px;
    border-bottom: 1.5px dashed var(--ink-faded);
  }

  /* item rows — same style as scanned_items, but with a "yours / theirs" label */
  .receipt {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 18px 18px 14px;
    position: relative;
    box-shadow: var(--shadow-paper);
  }
  .receipt::before, .receipt::after {
    content: ""; position: absolute; left: 0; right: 0; height: 12px;
    background: radial-gradient(circle at 7px 12px, transparent 7px, var(--paper) 7.5px) 0 0 / 14px 12px repeat-x;
  }
  .receipt::before { top: -10px; }
  .receipt::after { bottom: -10px; transform: scaleY(-1); }

  .item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 4px;
    border-bottom: 1px dotted var(--ink-faded);
    cursor: pointer;
  }
  .item:last-child { border-bottom: 0; }
  .item__name {
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    color: var(--ink);
  }
  .item__price {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    color: var(--ink-faded);
    margin-top: 2px;
    letter-spacing: 0.06em;
  }
  .item__check {
    appearance: none;
    width: 26px; height: 26px;
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    background: var(--paper-warm);
    cursor: pointer;
    position: relative;
    transition: background 160ms;
  }
  .item__check:checked { background: var(--stamp); border-color: var(--stamp); }
  .item__check:checked::after {
    content: "✓";
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: var(--paper);
    font-family: var(--font-mono);
    font-weight: 900;
    font-size: 14px;
  }

  .friends {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }
  .friend {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 0;
    cursor: pointer;
    color: var(--ink);
  }
  .friend__chip {
    width: 56px; height: 56px;
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    background: var(--paper-warm);
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 900;
    font-size: 22px;
    color: var(--ink);
    transition: transform 160ms, box-shadow 160ms;
  }
  .friend:hover .friend__chip {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 0 var(--ink);
  }
  .friend__chip--add {
    border-style: dashed;
    color: var(--ink-faded);
  }
  .friend__chip--selected {
    background: var(--ink);
    color: var(--paper);
  }
  .friend__chip--selected::after {
    content: "✓";
    position: absolute;
  }
  .friend__name {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink);
  }

  .search {
    width: 100%;
    background: var(--paper-warm);
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: var(--t-sm);
    color: var(--ink);
  }
  .search:focus {
    outline: 0;
    background: var(--paper);
    box-shadow: 0 0 0 2px var(--stamp);
    border-color: var(--stamp);
  }
  .search::placeholder { color: var(--ink-faded); }

  /* sticky CTA above the tab bar */
  .stick {
    position: fixed;
    left: 12px; right: 12px;
    bottom: calc(70px + env(safe-area-inset-bottom));
    z-index: 55;
  }
  .stick button, .stick a {
    width: 100%;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 14px 22px;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 4px 4px 0 0 var(--stamp);
  }
</style>
</head>
<body class="cipta-shell">

<header class="cipta-topbar">
  <a class="cipta-topbar__brand" href="dashboard.html">Cipta</a>
  <div class="cipta-topbar__title">Split list</div>
  <a class="cipta-topbar__action" href="scanned_items.html">Back</a>
</header>

<main>
  <div class="heading feed-in feed-in-1">
    <p class="heading__eyebrow">Shared meal</p>
    <h1 class="heading__title">Mark what was<br /><em>yours.</em></h1>
    <p class="heading__sub">Only your dishes count toward your plate</p>
  </div>

  <article class="receipt feed-in feed-in-2">
    <label class="item">
      <div>
        <div class="item__name">[ item 1 ]</div>
        <div class="item__price">[ $ ]</div>
      </div>
      <input class="item__check" type="checkbox" checked />
    </label>
    <label class="item">
      <div>
        <div class="item__name">[ item 2 ]</div>
        <div class="item__price">[ $ ]</div>
      </div>
      <input class="item__check" type="checkbox" checked />
    </label>
    <label class="item">
      <div>
        <div class="item__name">[ item 3 — friend's ]</div>
        <div class="item__price">[ $ ]</div>
      </div>
      <input class="item__check" type="checkbox" />
    </label>
    <label class="item">
      <div>
        <div class="item__name">[ item 4 — shared ]</div>
        <div class="item__price">[ $ ]</div>
      </div>
      <input class="item__check" type="checkbox" checked />
    </label>
  </article>

  <h2 class="section-title">Share with friends (optional)</h2>
  <div class="friends">
    <button type="button" class="friend">
      <div class="friend__chip">[A]</div>
      <span class="friend__name">[ Friend ]</span>
    </button>
    <button type="button" class="friend">
      <div class="friend__chip">[B]</div>
      <span class="friend__name">[ Friend ]</span>
    </button>
    <button type="button" class="friend">
      <div class="friend__chip">[C]</div>
      <span class="friend__name">[ Friend ]</span>
    </button>
    <button type="button" class="friend">
      <div class="friend__chip friend__chip--add">+</div>
      <span class="friend__name">More</span>
    </button>
  </div>

  <input class="search" type="text" placeholder="Search friends by name…" />
</main>

<div class="stick">
  <a href="scanned_items.html">Done splitting →</a>
</div>

<nav class="cipta-tabbar fixed bottom-0" aria-label="primary">
  <a href="dashboard.html" data-icon="home"><span class="tab__glyph">▥</span><span>Home</span></a>
  <a href="plate_history.html" data-icon="history"><span class="tab__glyph">≡</span><span>History</span></a>
  <a href="taste_favorites.html" data-icon="restaurant_menu" class="is-active"><span class="tab__glyph">★</span><span>Taste</span></a>
  <a href="profile.html" data-icon="person"><span class="tab__glyph">○</span><span>Profile</span></a>
</nav>

<script src="cipta.js" defer></script>
</body>
</html>
