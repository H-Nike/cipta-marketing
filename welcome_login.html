<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Cipta — Sign in</title>
<link rel="stylesheet" href="../cipta_design/tokens.css" />
<link rel="stylesheet" href="cipta.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: var(--t-base);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    opacity: 0.35; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0 0.06  0 0 0 0.16 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  a { color: inherit; text-decoration: none; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244, 237, 224, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1.5px solid var(--ink);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar__brand {
    font-family: var(--font-display);
    font-weight: 900; font-style: italic;
    font-size: var(--t-md);
    letter-spacing: -0.02em;
  }
  .topbar__back {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-soft);
    border-bottom: 1.5px solid var(--ink-faded);
    padding-bottom: 2px;
  }
  .topbar__back:hover { color: var(--ink); border-color: var(--ink); }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 48px 20px 96px;
    position: relative; z-index: 1;
  }
  .form-card {
    width: 100%; max-width: 460px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 48px 32px 36px;
    position: relative;
    box-shadow: var(--shadow-paper);
  }
  .form-card::before, .form-card::after {
    content: ""; position: absolute; left: 0; right: 0; height: 12px;
    background: radial-gradient(circle at 7px 12px, transparent 7px, var(--paper) 7.5px) 0 0 / 14px 12px repeat-x;
  }
  .form-card::before { top: -10px; }
  .form-card::after { bottom: -10px; transform: scaleY(-1); }

  .form-eyebrow {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    text-align: center;
    margin-bottom: 18px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .form-eyebrow::before, .form-eyebrow::after {
    content: ""; flex: 0 0 36px; height: 1.5px; background: var(--ink-faded);
  }
  .form-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: var(--t-xl);
    line-height: 1;
    letter-spacing: -0.025em;
    text-align: center;
    margin: 0 0 14px;
  }
  .form-title em { font-style: italic; color: var(--stamp); font-weight: 400; }
  .form-sub {
    text-align: center;
    color: var(--ink-soft);
    font-size: var(--t-sm);
    margin: 0 0 36px;
  }

  .field { margin-bottom: 22px; }
  .field__label {
    display: block;
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .field__input {
    width: 100%;
    background: var(--paper-warm);
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: var(--t-base);
    color: var(--ink);
    transition: background 160ms, box-shadow 160ms;
  }
  .field__input:focus {
    outline: 0;
    background: var(--paper);
    box-shadow: 0 0 0 2px var(--stamp);
    border-color: var(--stamp);
  }
  .field__input::placeholder { color: var(--ink-faded); }

  .field--password { position: relative; }
  .field__toggle {
    position: absolute;
    right: 14px; bottom: 14px;
    background: transparent; border: 0;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faded);
    cursor: pointer;
  }
  .field__toggle:hover { color: var(--stamp); }

  .field__row {
    display: flex; justify-content: flex-end; margin-top: 8px;
  }
  .field__row a {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-soft);
    border-bottom: 1.5px solid var(--ink-faded);
    padding-bottom: 2px;
  }
  .field__row a:hover { color: var(--stamp); border-color: var(--stamp); }

  .submit {
    width: 100%;
    margin-top: 12px;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 16px 22px;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 160ms, box-shadow 160ms;
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
  }
  .submit:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 0 var(--stamp);
  }
  .submit::after { content: "→"; font-size: 1.1em; }

  .divider {
    margin: 28px 0 22px;
    border: 0; border-top: 1.5px dashed var(--ink-faded);
    position: relative;
    text-align: center;
  }
  .divider span {
    background: var(--paper);
    padding: 0 12px;
    position: relative; top: -10px;
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faded);
  }

  .biometric {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    background: transparent;
    border: 0;
    cursor: pointer;
    margin: 0 auto 20px;
    color: var(--ink);
  }
  .biometric__circle {
    width: 64px; height: 64px;
    border: 2px solid var(--ink);
    border-radius: var(--r-sm);
    display: grid; place-items: center;
    background: var(--paper-warm);
    transition: transform 160ms, background 160ms;
  }
  .biometric:hover .biometric__circle {
    transform: translate(-1px, -1px);
    background: var(--paper);
    box-shadow: 3px 3px 0 0 var(--ink);
  }
  .biometric__icon {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .biometric__label {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }

  .signup-line {
    text-align: center;
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
    margin-top: 8px;
  }
  .signup-line a {
    color: var(--ink);
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 2px;
    margin-left: 6px;
  }
  .signup-line a:hover { color: var(--stamp); border-color: var(--stamp); }

  .pledge {
    text-align: center;
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--t-sm);
    color: var(--ink-soft);
    max-width: 36ch;
    margin: 32px auto 0;
    line-height: 1.5;
  }
  .pledge::before, .pledge::after {
    content: '"';
    color: var(--stamp);
    font-weight: 900;
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar__brand" href="landing.html">Cipta</a>
  <a class="topbar__back" href="landing.html">← Home</a>
</header>

<main>
  <div style="width: 100%; max-width: 460px;">
    <article class="form-card feed-in feed-in-1">
      <p class="form-eyebrow">Welcome back</p>
      <h1 class="form-title">Ready to <em>scan</em>?</h1>
      <p class="form-sub">Sign in to log your next plate.</p>

      <form action="dashboard.html" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="field">
          <label class="field__label" for="email">Email address</label>
          <input class="field__input" id="email" type="email" placeholder="hungry@example.com" required />
        </div>

        <div class="field field--password">
          <label class="field__label" for="password">Password</label>
          <input class="field__input" id="password" type="password" placeholder="••••••••" required />
          <button type="button" class="field__toggle" onclick="
            const i = document.getElementById('password');
            i.type = i.type === 'password' ? 'text' : 'password';
            this.textContent = i.type === 'password' ? 'Show' : 'Hide';
          ">Show</button>
          <div class="field__row"><a href="#">Forgot password?</a></div>
        </div>

        <button type="submit" class="submit">Sign in</button>
      </form>

      <hr class="divider"><span>Or</span></hr>

      <button type="button" class="biometric" onclick="window.location.href='dashboard.html';">
        <div class="biometric__circle"><span class="biometric__icon">ID</span></div>
        <span class="biometric__label">Use Face ID</span>
      </button>

      <p class="signup-line">
        New here?
        <a href="join_cipta.html">Create an account</a>
      </p>
    </article>

    <p class="pledge feed-in feed-in-3">
      Only diners who ate it can post it. — Cipta verified-plate pledge.
    </p>
  </div>
</main>

</body>
</html>
