<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Cipta — Pick a mood</title>
<link rel="stylesheet" href="../cipta_design/tokens.css" />
<link rel="stylesheet" href="cipta.css" />
<style>
  body { padding-bottom: 80px; }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 40px;
  }

  .heading { text-align: center; margin-bottom: 36px; }
  .heading__eyebrow {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    margin-bottom: 14px;
    display: inline-block;
    padding: 4px 12px;
    border: 1.5px solid var(--ink-soft);
    border-radius: var(--r-sm);
  }
  .heading__title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(2.25rem, 6vw, 3rem);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 14px;
  }
  .heading__title em { font-style: italic; color: var(--stamp); font-weight: 400; }
  .heading__sub {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
    line-height: 1.6;
    max-width: 36ch;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 36px;
  }
  @media (min-width: 720px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .mood {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 28px 18px 22px;
    text-align: center;
    cursor: pointer;
    transition: transform 160ms, box-shadow 160ms, background 160ms;
    color: var(--ink);
    position: relative;
  }
  .mood:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 0 var(--ink);
  }
  .mood.is-selected {
    background: var(--ink); color: var(--paper);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 0 var(--stamp);
  }
  .mood.is-selected::after {
    content: "✓";
    position: absolute;
    top: 8px; right: 12px;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--night-stamp);
  }
  .mood__glyph {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 900;
    font-size: 36px;
    line-height: 1;
    margin-bottom: 12px;
    color: var(--stamp);
    letter-spacing: -0.02em;
  }
  .mood.is-selected .mood__glyph { color: var(--night-stamp); }
  .mood__name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: var(--t-base);
    letter-spacing: -0.005em;
  }
  .mood__hint {
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faded);
  }
  .mood.is-selected .mood__hint { color: var(--paper-deep); }

  .mood--other {
    border-style: dashed;
    color: var(--ink-soft);
  }

  .submit {
    display: block;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: var(--r-sm);
    padding: 18px 22px;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: transform 160ms, box-shadow 160ms;
  }
  .submit:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 0 var(--stamp);
  }
  .submit-meta {
    font-family: var(--font-mono);
    font-size: var(--t-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faded);
    text-align: center;
    margin-top: 14px;
  }
</style>
</head>
<body class="cipta-shell">

<header class="cipta-topbar">
  <a class="cipta-topbar__brand" href="dashboard.html">Cipta</a>
  <div class="cipta-topbar__title">Mood</div>
  <a class="cipta-topbar__action" href="scanned_items.html">Back</a>
</header>

<main>
  <div class="heading feed-in feed-in-1">
    <span class="heading__eyebrow">Step 3 of 3 · optional</span>
    <h1 class="heading__title">How was the<br /><em>vibe?</em></h1>
    <p class="heading__sub">Sets the tone for your review · doesn't change the score</p>
  </div>

  <div class="grid feed-in feed-in-2" role="radiogroup" aria-label="meal mood">
    <button type="button" class="mood is-selected" data-mood="celebratory">
      <div class="mood__glyph">★</div>
      <div class="mood__name">Celebratory</div>
      <div class="mood__hint">Special occasion</div>
    </button>
    <button type="button" class="mood" data-mood="comforted">
      <div class="mood__glyph">○</div>
      <div class="mood__name">Comforted</div>
      <div class="mood__hint">Reliable favorite</div>
    </button>
    <button type="button" class="mood" data-mood="adventurous">
      <div class="mood__glyph">△</div>
      <div class="mood__name">Adventurous</div>
      <div class="mood__hint">First-time spot</div>
    </button>
    <button type="button" class="mood" data-mood="quick">
      <div class="mood__glyph">⏵</div>
      <div class="mood__name">Quick bite</div>
      <div class="mood__hint">In and out</div>
    </button>
    <button type="button" class="mood" data-mood="nostalgic">
      <div class="mood__glyph">~</div>
      <div class="mood__name">Nostalgic</div>
      <div class="mood__hint">Familiar recipe</div>
    </button>
    <button type="button" class="mood mood--other" data-mood="other">
      <div class="mood__glyph">+</div>
      <div class="mood__name">Skip</div>
      <div class="mood__hint">No mood</div>
    </button>
  </div>

  <a class="submit" href="reviewing_plate.html">Continue to review →</a>
  <p class="submit-meta">Step 3 of 3</p>
</main>

<nav class="cipta-tabbar fixed bottom-0" aria-label="primary">
  <a href="dashboard.html" data-icon="home"><span class="tab__glyph">▥</span><span>Home</span></a>
  <a href="plate_history.html" data-icon="history"><span class="tab__glyph">≡</span><span>History</span></a>
  <a href="taste_favorites.html" data-icon="restaurant_menu" class="is-active"><span class="tab__glyph">★</span><span>Taste</span></a>
  <a href="profile.html" data-icon="person"><span class="tab__glyph">○</span><span>Profile</span></a>
</nav>

<script>
  document.querySelectorAll('.mood').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood').forEach((b) => b.classList.remove('is-selected'));
      btn.classList.add('is-selected');
    });
  });
</script>
<script src="cipta.js" defer></script>
</body>
</html>
